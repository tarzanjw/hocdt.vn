<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ocean Drop · Hồ sơ kỹ năng thành viên</title>
<style>
  :root{
    --bg:#04121f; --bg2:#07203a; --card:#0b2c47; --card2:#0e3555;
    --line:#1c4a6e; --txt:#e8f4fb; --sub:#8fb8d4; --accent:#35c4e8;
    --accent2:#7be3c0; --gold:#ffd166;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
    background:radial-gradient(1200px 600px at 70% -10%, #0d3a5c 0%, var(--bg) 55%);
    color:var(--txt); min-height:100vh; padding-bottom:60px;
  }
  header{padding:44px 20px 8px; text-align:center;}
  .club{font-size:13px;letter-spacing:4px;text-transform:uppercase;color:var(--accent2);font-weight:700}
  h1{font-size:clamp(26px,4.5vw,40px);margin:6px 0 4px;font-weight:800}
  h1 .drop{color:var(--accent)}
  .subtitle{color:var(--sub);font-size:14px}
  .wave{max-width:900px;margin:14px auto 26px;height:2px;
    background:linear-gradient(90deg,transparent,var(--accent),var(--accent2),transparent)}

  .grid{max-width:1060px;margin:0 auto;padding:0 18px;
    display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px}
  .card{
    background:linear-gradient(160deg,var(--card),var(--card2));
    border:1px solid var(--line);border-radius:16px;padding:18px 18px 16px;
    cursor:pointer;transition:transform .15s ease, box-shadow .15s ease, border-color .15s;
    position:relative;overflow:hidden;
  }
  .card:hover{transform:translateY(-4px);border-color:var(--accent);
    box-shadow:0 10px 30px rgba(53,196,232,.15)}
  .rank{position:absolute;top:12px;right:14px;font-size:12px;color:var(--sub)}
  .badge{position:absolute;top:0;right:0;background:var(--gold);color:#3a2c00;
    font-size:11px;font-weight:800;padding:4px 12px;border-radius:0 14px 0 12px}
  .name{font-size:19px;font-weight:800;margin-bottom:10px}
  .score-row{display:flex;align-items:baseline;gap:8px;margin-bottom:10px}
  .score{font-size:34px;font-weight:800;color:var(--accent)}
  .score-max{color:var(--sub);font-size:14px}
  .bar{height:6px;background:#0a2238;border-radius:4px;overflow:hidden;margin-bottom:12px}
  .bar i{display:block;height:100%;border-radius:4px;
    background:linear-gradient(90deg,var(--accent),var(--accent2))}
  .quip{font-size:13.5px;color:var(--sub);line-height:1.45;font-style:italic}
  .tap{margin-top:10px;font-size:11px;color:#4f7fa3;text-transform:uppercase;letter-spacing:1px}

  /* Detail overlay */
  .overlay{position:fixed;inset:0;background:rgba(3,14,25,.85);backdrop-filter:blur(6px);
    display:none;overflow-y:auto;z-index:50;padding:30px 16px}
  .overlay.open{display:block}
  .detail{max-width:860px;margin:0 auto;background:linear-gradient(170deg,#0c3050,#07203a);
    border:1px solid var(--line);border-radius:20px;padding:26px 24px 30px;position:relative}
  .close{position:absolute;top:14px;right:16px;background:#123b5e;border:1px solid var(--line);
    color:var(--txt);width:36px;height:36px;border-radius:50%;font-size:18px;cursor:pointer}
  .close:hover{background:var(--accent);color:#03202f}
  .d-head{display:flex;flex-wrap:wrap;align-items:center;gap:14px;margin-bottom:6px}
  .d-name{font-size:26px;font-weight:800}
  .d-score{background:#0a2a44;border:1px solid var(--line);border-radius:12px;
    padding:6px 14px;font-weight:800;color:var(--accent);font-size:18px}
  .d-meta{color:var(--sub);font-size:13px;margin-bottom:6px}
  .d-quip{color:var(--accent2);font-style:italic;font-size:14px;margin-bottom:18px}

  .charts{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px;margin-bottom:20px}
  .chart-box{background:#0a2a44;border:1px solid var(--line);border-radius:14px;padding:14px 10px 8px;text-align:center}
  .chart-title{font-size:13px;font-weight:700;color:var(--accent2);margin-bottom:4px;
    text-transform:uppercase;letter-spacing:1px}
  .chart-avg{font-size:12px;color:var(--sub);margin-bottom:6px}
  svg{width:100%;height:auto}
  .axis-line{stroke:#1c4a6e;stroke-width:1}
  .ring{fill:none;stroke:#153c5d;stroke-width:1}
  .poly{fill:rgba(53,196,232,.25);stroke:var(--accent);stroke-width:2}
  .dot{fill:var(--accent2)}
  .lbl{fill:#a9cde4;font-size:10.5px}
  .lbl-val{fill:#7be3c0;font-size:10px;font-weight:700}

  .gaugewrap{display:flex;flex-direction:column;gap:14px;padding:14px 14px 18px}
  .gauge-label{display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px}
  .gauge-label b{color:var(--accent2)}
  .gauge{height:12px;background:#08223a;border-radius:8px;overflow:hidden}
  .gauge i{display:block;height:100%;border-radius:8px;
    background:linear-gradient(90deg,var(--accent),var(--accent2))}

  .comment-box{background:#0a2a44;border:1px solid var(--line);border-left:4px solid var(--accent);
    border-radius:12px;padding:16px 18px;line-height:1.65;font-size:14.5px}
  .comment-title{font-weight:800;color:var(--accent);margin-bottom:6px;font-size:13px;
    text-transform:uppercase;letter-spacing:1px}
  .peer{margin-top:14px;background:#0a2a44;border:1px solid var(--line);border-left:4px solid var(--gold);
    border-radius:12px;padding:12px 18px;font-size:13.5px;color:var(--sub);line-height:1.6}
  .peer b{color:var(--gold)}
  footer{text-align:center;color:#3f6d92;font-size:12px;margin-top:44px}

  /* Matches section */
  .section-head{max-width:1060px;margin:46px auto 16px;padding:0 18px;
    display:flex;align-items:center;gap:12px}
  .section-head h2{font-size:22px;font-weight:800}
  .section-head .fire{font-size:22px}
  .section-head .line{flex:1;height:1px;background:linear-gradient(90deg,var(--line),transparent)}
  .mgrid{max-width:1060px;margin:0 auto;padding:0 18px;
    display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
  .mcard{background:linear-gradient(160deg,#123049,#0d2b46);
    border:1px solid var(--line);border-radius:16px;padding:18px;cursor:pointer;
    transition:transform .15s ease, box-shadow .15s ease, border-color .15s;position:relative;overflow:hidden}
  .mcard:hover{transform:translateY(-4px);border-color:var(--gold);
    box-shadow:0 10px 30px rgba(255,209,102,.12)}
  .mtag{display:inline-block;background:rgba(255,209,102,.15);color:var(--gold);
    border:1px solid rgba(255,209,102,.4);font-size:11px;font-weight:800;
    padding:3px 10px;border-radius:20px;letter-spacing:1px;text-transform:uppercase;margin-bottom:10px}
  .mname{font-size:20px;font-weight:800;margin-bottom:12px}
  .mteams{display:flex;align-items:center;gap:10px;margin-bottom:14px}
  .mteam{flex:1;background:#0a2a44;border:1px solid var(--line);border-radius:10px;
    padding:8px 6px;text-align:center;font-size:13px;font-weight:700;line-height:1.4}
  .mteam small{display:block;color:var(--sub);font-weight:400;font-size:11px;margin-top:2px}
  .vs{color:var(--gold);font-weight:800;font-size:13px}
  .probbar{display:flex;height:22px;border-radius:11px;overflow:hidden;font-size:11.5px;
    font-weight:800;margin-bottom:6px}
  .probbar .pA{background:linear-gradient(90deg,#2aa7d8,#35c4e8);color:#03202f;
    display:flex;align-items:center;padding-left:10px}
  .probbar .pB{background:linear-gradient(90deg,#f0b64f,#ffd166);color:#3a2c00;
    display:flex;align-items:center;justify-content:flex-end;padding-right:10px}
  .probnote{font-size:11.5px;color:var(--sub);text-align:center}

  /* Match detail */
  .m-vs-head{display:flex;align-items:stretch;gap:12px;margin:14px 0 18px}
  .m-side{flex:1;border-radius:14px;padding:14px 10px;text-align:center;border:1px solid var(--line)}
  .m-side.blue{background:rgba(53,196,232,.1);border-color:rgba(53,196,232,.45)}
  .m-side.gold{background:rgba(255,209,102,.08);border-color:rgba(255,209,102,.4)}
  .m-side .tname{font-weight:800;font-size:16px;line-height:1.4}
  .m-side .tscore{font-size:26px;font-weight:800;margin-top:4px}
  .m-side.blue .tscore{color:var(--accent)}
  .m-side.gold .tscore{color:var(--gold)}
  .m-side .tprob{font-size:12px;color:var(--sub);margin-top:2px}
  .m-vs-mid{display:flex;align-items:center;font-size:20px;font-weight:800;color:var(--sub)}
  .compare{margin-bottom:18px}
  .cmp-row{margin-bottom:10px}
  .cmp-label{display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:4px;color:var(--sub)}
  .cmp-label b.left{color:var(--accent)} .cmp-label b.right{color:var(--gold)}
  .cmp-track{display:flex;height:10px;border-radius:6px;overflow:hidden;background:#08223a}
  .cmp-track .cL{background:linear-gradient(90deg,#2aa7d8,#35c4e8)}
  .cmp-track .cR{background:linear-gradient(90deg,#f0b64f,#ffd166)}
  .hotlist{margin:0 0 18px;padding:0;list-style:none}
  .hotlist li{background:#0a2a44;border:1px solid var(--line);border-radius:10px;
    padding:10px 14px;margin-bottom:8px;font-size:13.5px;line-height:1.55}
  .hotlist li b{color:var(--accent2)}
  .scen{background:#0a2a44;border:1px solid var(--line);border-radius:12px;
    padding:12px 16px;margin-bottom:10px;font-size:13.5px;line-height:1.6}
  .scen .sc-t{font-weight:800;color:var(--accent);margin-bottom:3px;font-size:13px}
  .verdict{background:linear-gradient(135deg,rgba(255,209,102,.12),rgba(53,196,232,.1));
    border:1px solid var(--gold);border-radius:12px;padding:14px 18px;line-height:1.65;font-size:14.5px}
  .verdict .v-t{font-weight:800;color:var(--gold);font-size:13px;text-transform:uppercase;
    letter-spacing:1px;margin-bottom:6px}
  .banter{background:rgba(123,227,192,.07);border:1px solid rgba(123,227,192,.35);
    border-left:4px solid var(--accent2);border-radius:12px;padding:16px 18px;
    margin-bottom:18px;font-size:14.5px;line-height:1.7}
  .banter .b-t{font-weight:800;color:var(--accent2);font-size:13px;text-transform:uppercase;
    letter-spacing:1px;margin-bottom:8px}
  .banter p{margin-bottom:10px}
  .banter p:last-child{margin-bottom:0}
  .banter em{color:var(--accent2);font-style:normal;font-weight:700}
</style>
</head>
<body>
<header>
  <div class="club">Ocean Drop Pickleball Club</div>
  <h1>Hồ sơ kỹ năng <span class="drop">thành viên</span></h1>
  <div class="subtitle">Đánh giá 360° · Thang điểm 1–5 · Bấm vào thẻ để xem chi tiết</div>
  <div class="wave"></div>
</header>

<div class="grid" id="grid"></div>

<div class="section-head">
  <span class="fire">🔥</span><h2>Kèo sắp diễn ra</h2><div class="line"></div>
</div>
<div class="mgrid" id="mgrid"></div>

<div class="overlay" id="overlay" onclick="if(event.target===this)closeDetail()">
  <div class="detail" id="detail"></div>
</div>

<footer>© Ocean Drop · Tổng hợp từ 52 phiếu Đánh giá 360° hợp lệ (chấm lại thì lấy lần gần nhất)</footer>

<script>
const HARD = ["Serve","Return","Dink","Drive","Drop","Volley/Smash","Footwork"];
const TACT = ["Đọc trận","Thích ứng","Phối hợp"];
const MENT = ["Hạn chế lỗi","Bản lĩnh"];

const MEMBERS = [
 {name:"A Trọng", n:5,
  s:{"Serve":4.6,"Return":4.8,"Dink":4.6,"Drive":3.8,"Drop":5,"Volley/Smash":4.6,"Footwork":5,"Đọc trận":5,"Thích ứng":4.6,"Phối hợp":5,"Hạn chế lỗi":4.6,"Bản lĩnh":4.8},
  quip:"4.70/5 từ cả 5 giám khảo — toàn năng được kiểm chứng, không phải fan cuồng chấm hộ.",
  peer:null,
  comment:"Khi cả 5 người chấm mà điểm vẫn 4.70 thì không còn gì để bàn cãi: anh Trọng là bạn đôi trong mơ của cả club. Drop 5, Footwork 5, Đọc trận 5, Phối hợp 5 — bốn chỉ số cốt lõi của pickleball đôi đều tuyệt đối, giờ Dink cũng lên 4.6. Đứng cạnh anh Trọng nghĩa là luôn có người bọc lót, luôn có người gọi bài, và gần như không bao giờ bị bỏ rơi giữa sân. Chỗ 'người phàm' duy nhất là Drive (3.8) — ghép với tay drive khỏe như A An là cặp đôi gần như không có điểm yếu."},
 {name:"A An", n:5,
  s:{"Serve":4.8,"Return":4.4,"Dink":4,"Drive":5,"Drop":4.2,"Volley/Smash":5,"Footwork":5,"Đọc trận":4.8,"Thích ứng":4.6,"Phối hợp":4.6,"Hạn chế lỗi":4.6,"Bản lĩnh":5},
  quip:"Drive 5, Smash 5, Bản lĩnh 5 — cỗ máy hủy diệt có gắn bộ não.",
  peer:null,
  comment:"Chỉ kém ngôi đầu đúng 0.03 điểm! Bảng điểm 5 người chấm xác nhận anh An là gói combo hiếm: hỏa lực tối đa (Drive 5, Smash 5, Footwork 5) đi kèm cái đầu lạnh (Đọc trận 4.8, Hạn chế lỗi 4.6, Bản lĩnh 5). Nện mạnh mà không nện ẩu — đối thủ muốn câu lỗi cũng chẳng có gì để câu. Dink 4.0 là chỉ số 'thấp' nhất, nói cho vui thôi chứ vẫn ổn, nhưng nếu muốn tối ưu thì cứ để bạn đôi cầm nhịp bóng ngắn, còn anh An rình bóng bổng để kết liễu. Ghép An - Trọng lại với nhau chắc phải cho cặp đó chấp điểm cả club."},
 {name:"A Học", n:5,
  s:{"Serve":4.4,"Return":4.4,"Dink":4.2,"Drive":4.6,"Drop":4.2,"Volley/Smash":4.6,"Footwork":4.6,"Đọc trận":4.8,"Thích ứng":4.8,"Phối hợp":4.8,"Hạn chế lỗi":4.4,"Bản lĩnh":4.6},
  quip:"12 tiêu chí, thấp nhất là... 4.2. Đối thủ soi mãi không ra chỗ để đánh.",
  peer:null,
  comment:"Nhìn radar của anh Học mà nản giùm đối thủ: 12 tiêu chí, tiêu chí thấp nhất là 4.2 — một hồ sơ không có bất kỳ lỗ hổng nào. Đặc biệt bộ ba chiến thuật đều 4.8: đọc trận nhanh, đổi bài khéo, bọc lót chuẩn. Đây là mẫu người chơi 'nhân đôi sức mạnh' cho bất kỳ ai đứng cạnh: cạnh tay công thì làm quân sư kiêm hậu phương, cạnh người mới thì làm chỗ dựa cân cả sân. Muốn thắng cặp có anh Học chỉ có một cách: đánh hay hơn, chứ đừng mơ 'câu lỗi' hay bắt bài."},
 {name:"A Tiến", n:4,
  s:{"Serve":4,"Return":4.25,"Dink":4,"Drive":4.25,"Drop":4.5,"Volley/Smash":4,"Footwork":4,"Đọc trận":5,"Thích ứng":4.75,"Phối hợp":4.75,"Hạn chế lỗi":4.5,"Bản lĩnh":4.75},
  quip:"Bộ não 5/5 của club — và anh em xác nhận: chân không hề chậm như lời đồn.",
  peer:null,
  comment:"Đọc trận 5/5 tròn trĩnh từ cả 4 người chấm — danh hiệu 'bộ não của club' đã được hội đồng công nhận. Điều thú vị là bảng điểm đông người chấm còn 'minh oan' cho anh Tiến: Footwork và Volley giờ đều 4.0, không còn là gót chân Achilles như đánh giá trước nữa. Cộng thêm Thích ứng 4.75, Phối hợp 4.75, Bản lĩnh 4.75 — đây là mẫu người chơi càng vào sâu trận càng đáng sợ, vì đối thủ đánh bài nào anh bắt bài đó. Ghép với tay công thuần như A Hiếu là mô hình 'quân sư + đao phủ' hoàn hảo: anh Tiến setup, đồng đội kết liễu."},
 {name:"A Hiệp", n:5,
  s:{"Serve":4.8,"Return":4.6,"Dink":4,"Drive":4.4,"Drop":4.2,"Volley/Smash":4.4,"Footwork":4,"Đọc trận":4.6,"Thích ứng":4.2,"Phối hợp":4.6,"Hạn chế lỗi":4,"Bản lĩnh":4.4},
  quip:"Khai cuộc số một: Serve 4.8, Return 4.6 — mỗi rally đều mở màn có lợi thế.",
  peer:null,
  comment:"Vẫn là chuyên gia khai cuộc số một club: Serve 4.8, Return 4.6 — hai cú đầu tiên của mỗi rally đều nghiêng về đội anh Hiệp, và trong pickleball đôi thì đó là nửa trận thắng. Điểm mới đáng chú ý: Đọc trận 4.6 và Phối hợp 4.6 theo đánh giá tập thể — hóa ra anh không chỉ giao bóng hay mà còn chơi đầu óc. Bảng điểm giờ đều tăm tắp quanh mức 4–4.4, không còn điểm yếu rõ rệt nào. Ghép với người giỏi kiểm soát khu bếp như A Trọng, A Hùng để anh Hiệp dồn toàn lực vào 2–3 cú đầu là công thức ăn tiền."},
 {name:"A Hiếu", n:5,
  s:{"Serve":4.2,"Return":4,"Dink":4.6,"Drive":4.4,"Drop":4,"Volley/Smash":4.8,"Footwork":4.2,"Đọc trận":3.4,"Thích ứng":3.2,"Phối hợp":3,"Hạn chế lỗi":3.4,"Bản lĩnh":4.4},
  quip:"Cú quả vẫn thuộc hàng khủng nhất club — nhưng hội đồng nhất trí: 'đánh hay, phối hợp thì... hên xui'.",
  peer:null,
  comment:"Kỹ năng cứng vẫn thuộc hàng đỉnh của club: Smash 4.8, Dink 4.6, Drive 4.4 — cú quả nào cũng là vũ khí, cộng Bản lĩnh 4.4 nên điểm căng vẫn dám đánh. Nhưng khi 5 người cùng chấm thì bức tranh chiến thuật hiện rõ: Phối hợp 3.0, Thích ứng 3.2, Đọc trận 3.4 — hội đồng đồng thuận rằng anh Hiếu đánh đơn trong... trận đôi hơi nhiều. Tin tốt: đây là thứ dễ sửa nhất, chỉ cần giao tiếp trước và trong trận. Ghép với 'bộ não' như A Tiến hay A Trọng, phân vai rõ ai ăn bóng giữa, thì hỏa lực này được khai thác đúng chỗ — lúc đó thứ hạng sẽ bật lên ngay."},
 {name:"A Hùng", n:5,
  s:{"Serve":2.8,"Return":3.4,"Dink":3.4,"Drive":2.4,"Drop":4.2,"Volley/Smash":4.2,"Footwork":4,"Đọc trận":4.4,"Thích ứng":4.4,"Phối hợp":4.4,"Hạn chế lỗi":4.4,"Bản lĩnh":4.6},

  const vals=Object.values(m.s);
  m.total=+(vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(2);
  m.avg=g=>+(g.map(k=>m.s[k]).reduce((a,b)=>a+b,0)/g.length).toFixed(1);
});

function radarSVG(keys, scores, size){
  const cx=size/2, cy=size/2+6, R=size/2-46, n=keys.length;
  const pt=(i,r)=>{const a=-Math.PI/2+i*2*Math.PI/n;return[cx+r*Math.cos(a),cy+r*Math.sin(a)]};
  let s=`<svg viewBox="0 0 ${size} ${size+10}">`;
  for(let ring=1;ring<=5;ring++){
    const pts=keys.map((_,i)=>pt(i,R*ring/5).join(',')).join(' ');
    s+=`<polygon class="ring" points="${pts}"/>`;
  }
  keys.forEach((_,i)=>{const [x,y]=pt(i,R);s+=`<line class="axis-line" x1="${cx}" y1="${cy}" x2="${x}" y2="${y}"/>`});
  const poly=keys.map((k,i)=>pt(i,R*scores[k]/5).join(',')).join(' ');
  s+=`<polygon class="poly" points="${poly}"/>`;
  keys.forEach((k,i)=>{
    const [dx,dy]=pt(i,R*scores[k]/5);
    s+=`<circle class="dot" cx="${dx}" cy="${dy}" r="3.5"/>`;
    const [lx,ly]=pt(i,R+22);
    const anchor=Math.abs(lx-cx)<10?'middle':(lx>cx?'start':'end');
    s+=`<text class="lbl" x="${lx}" y="${ly}" text-anchor="${anchor}">${k}</text>`;
    s+=`<text class="lbl-val" x="${lx}" y="${ly+12}" text-anchor="${anchor}">${scores[k]}</text>`;
  });
  return s+'</svg>';
}

function gaugeHTML(keys, scores){
  return `<div class="gaugewrap">`+keys.map(k=>`
    <div>
      <div class="gauge-label"><span>${k}</span><b>${scores[k]} / 5</b></div>
      <div class="gauge"><i style="width:${scores[k]/5*100}%"></i></div>
    </div>`).join('')+`</div>`;
}

function openDetail(m,i){
  const d=document.getElementById('detail');
  d.innerHTML=`
    <button class="close" onclick="closeDetail()">✕</button>
    <div class="d-head">
      <div class="d-name">${i===0?'🏆 ':''}${m.name}</div>
      <div class="d-score">${m.total.toFixed(2)} / 5</div>
    </div>
    <div class="d-meta">Xếp hạng #${i+1} · Tổng hợp từ ${m.n} lượt đánh giá</div>
    <div class="d-quip">“${m.quip}”</div>
    <div class="charts">
      <div class="chart-box">
        <div class="chart-title">Kỹ năng cứng</div>
        <div class="chart-avg">Trung bình: ${m.avg(HARD)} / 5</div>
        ${radarSVG(HARD,m.s,290)}
      </div>
      <div class="chart-box">
        <div class="chart-title">Chiến thuật</div>
        <div class="chart-avg">Trung bình: ${m.avg(TACT)} / 5</div>
        ${radarSVG(TACT,m.s,290)}
      </div>
      <div class="chart-box">
        <div class="chart-title">Ổn định & Tâm lý</div>
        <div class="chart-avg">Trung bình: ${m.avg(MENT)} / 5</div>
        ${gaugeHTML(MENT,m.s)}
      </div>
    </div>
    <div class="comment-box">
      <div class="comment-title">🎾 Nhận xét thi đấu đôi</div>
      ${m.comment}
    </div>
    ${m.peer?`<div class="peer">💬 ${m.peer}</div>`:''}
  `;
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow='hidden';
}

const byName=n=>MEMBERS.find(m=>m.name===n);
function teamStats(names){
  const ms=names.map(byName);
  const avg=g=>+(ms.map(m=>m.avg(g)).reduce((a,b)=>a+b,0)/ms.length).toFixed(2);
  return {total:+(ms.reduce((a,b)=>a+b.total,0)/ms.length).toFixed(2),
    hard:avg(HARD), tact:avg(TACT), ment:avg(MENT)};
}

    {t:"Kịch bản 1 — Dí bóng ngắn vào Hoàng Anh (dễ xảy ra nhất)", d:"Đạt - Học kéo trận về khu bếp, mọi đường bóng đều tìm Hoàng Anh. Tiến biết bài này nhưng một mình không cover nổi. Đạt - Học thắng 11-6, 11-8."},
    {t:"Kịch bản 2 — Ngày 'Già mà gân' thăng hoa", d:"Hoàng Anh vào đúng trận hay: drive 4.6 nổ liên hồi, Tiến chỉ việc setup. Bản lĩnh 3.25 của Đạt bị thử lửa ở điểm căng. Hoàng Anh - Tiến ăn séc đầu 11-9, cả kèo về séc 3 kịch tính."},
    {t:"Kịch bản 3 — Tiến độc diễn", d:"Tiến chủ động ôm 70% sân, điều Hoàng Anh về đúng một nhiệm vụ: đứng cuối sân chờ nện. Nếu Đạt - Học nôn nóng đánh vào Tiến thay vì kiên nhẫn tìm Hoàng Anh, kèo hoàn toàn có thể lật 2-1."}
  ],
  verdict:"Đạt - Học cửa trên (65/35) nhờ độ 'ăn rơ' vượt trội: Học là đúng mẫu partner mà Đạt cần, còn Hoàng Anh - Tiến là cặp lệch pha — quân sư hàng đầu đi kèm quả bom nổ chậm lúc nổ lúc xịt. Kèo này thực chất là canh bạc phong độ của Hoàng Anh: trận hay thì Tiến có vũ khí, trận dở thì Tiến gánh không nổi. Dự đoán: Đạt - Học thắng 2-0 và bia về đội xanh. Lời khuyên cho đội Hoàng Anh - Tiến: khởi động thật kỹ, hôm đó phải là 'trận hay' 😄"}
];

const mgrid=document.getElementById('mgrid');
MATCHES.forEach((k,i)=>{
  const tA=teamStats(k.A.names), tB=teamStats(k.B.names);
  k.A.stats=tA; k.B.stats=tB;
  const c=document.createElement('div');
  c.className='mcard';
  c.innerHTML=`
    <div class="mtag">${k.tag}</div>
    <div class="mname">${k.name}</div>
    <div class="mteams">
      <div class="mteam">${k.A.label}<small>TB ${tA.total.toFixed(2)}/5</small></div>
      <div class="vs">VS</div>
      <div class="mteam">${k.B.label}<small>TB ${tB.total.toFixed(2)}/5</small></div>
    </div>
    <div class="probbar">
      <div class="pA" style="width:${k.A.prob}%">${k.A.prob}%</div>
      <div class="pB" style="width:${k.B.prob}%">${k.B.prob}%</div>
    </div>
    <div class="probnote">Dự báo cửa thắng · Bấm xem phân tích ▸</div>`;
  c.onclick=()=>openMatch(k);
  mgrid.appendChild(c);
});

function cmpRow(label,a,b){
  const sum=a+b;
  return `<div class="cmp-row">
    <div class="cmp-label"><b class="left">${a.toFixed(2)}</b><span>${label}</span><b class="right">${b.toFixed(2)}</b></div>
    <div class="cmp-track"><div class="cL" style="width:${a/sum*100}%"></div><div class="cR" style="width:${b/sum*100}%"></div></div>
  </div>`;
}

function openMatch(k){
  const d=document.getElementById('detail');
  d.innerHTML=`
    <button class="close" onclick="closeDetail()">✕</button>
    <div class="mtag">${k.tag}</div>
    <div class="d-name" style="font-size:26px;font-weight:800">${k.name}</div>
    <div class="d-quip">“${k.tagline}”</div>
    <div class="m-vs-head">
      <div class="m-side blue">
        <div class="tname">${k.A.label}</div>
        <div class="tscore">${k.A.stats.total.toFixed(2)}</div>
        <div class="tprob">Cửa thắng ${k.A.prob}%</div>
      </div>
      <div class="m-vs-mid">VS</div>
      <div class="m-side gold">
        <div class="tname">${k.B.label}</div>
        <div class="tscore">${k.B.stats.total.toFixed(2)}</div>
        <div class="tprob">Cửa thắng ${k.B.prob}%</div>
      </div>
    </div>
    <div class="probbar" style="height:26px;font-size:13px">
      <div class="pA" style="width:${k.A.prob}%">${k.A.prob}%</div>
      <div class="pB" style="width:${k.B.prob}%">${k.B.prob}%</div>
    </div>
    <div style="height:16px"></div>
    <div class="compare">
      ${cmpRow('Kỹ năng cứng',k.A.stats.hard,k.B.stats.hard)}
      ${cmpRow('Chiến thuật',k.A.stats.tact,k.B.stats.tact)}
      ${cmpRow('Ổn định & Tâm lý',k.A.stats.ment,k.B.stats.ment)}
    </div>
    <div class="banter"><div class="b-t">🎙️ Góc bình luận viên</div>${k.banter}</div>
    <div class="comment-title" style="color:var(--accent);font-weight:800;font-size:13px;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">🔥 Điểm nóng của kèo</div>
    <ul class="hotlist">${k.hots.map(h=>`<li>${h}</li>`).join('')}</ul>
    <div class="comment-title" style="color:var(--accent);font-weight:800;font-size:13px;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">🎬 Kịch bản khả dĩ</div>
    ${k.scens.map(s=>`<div class="scen"><div class="sc-t">${s.t}</div>${s.d}</div>`).join('')}
    <div style="height:6px"></div>
    <div class="verdict"><div class="v-t">🏁 Chốt kèo</div>${k.verdict}</div>
  `;
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow='hidden';
}

function closeDetail(){
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow='';
}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeDetail()});
</script>
</body>
</html>
